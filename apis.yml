aid: lobsters
name: Lobsters
description: >-
  Lobsters is a technology-focused link aggregation and community discussion
  platform. Its public REST API provides access to stories, comments, tags,
  and user profiles, returning JSON representations of community-submitted
  technology links, ranked and filtered by the community.
